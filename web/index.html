<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="presensigps">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>presensigps</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter.js" defer></script>

  <script>
    window.addEventListener('load', function() {
      if (!window._flutter) {
        window._flutter = {};
      }
      window._flutter.buildConfig = {
        entryPoint: "main.dart.js",
        serviceWorkerVersion: null,
        builds: [
          {
            compileTarget: "dart2js",
            renderer: "canvaskit", 
            mainJsPath: "main.dart.js"
          }
        ]
      };
      if (!window._flutter.loader) {
        console.error("Flutter loader tidak ditemukan. Pastikan file flutter.js ada.");
        return;
      }
      window._flutter.loader.load({
        onEntrypointLoaded: async function(engineInitializer) {
          console.log("Mencoba memaksa HTML Renderer...");
          
          const appRunner = await engineInitializer.initializeEngine({
            renderer: "html"
          });
          
          await appRunner.runApp();
        }
      });
    });
  </script>
</body>
</html>
